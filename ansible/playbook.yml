---
- name: Configure PM Alert environment and deploy to Kubernetes
  hosts: local
  gather_facts: false

  vars:
    k8s_dir: "{{ playbook_dir }}/../k8s"
    venv_path: "{{ playbook_dir }}/.venv"
    namespace_name: "{{ namespace | default('dustwatch') }}"
    app_label: "{{ app_name | default('pm-alert') }}"
    deployment: "{{ deployment_name | default('pm-alert') }}"
    service: "{{ service_name | default('pm-alert-service') }}"
    container: "{{ container_name | default('pm-alert') }}"
    image: "{{ docker_image | default('tanyathep/pm-alert-app:latest') }}"
    replicas_count: "{{ replicas | default(2) }}"
    minikube_driver_name: "{{ minikube_driver | default('docker') }}"
    minikube_extra_args: "{{ minikube_start_extra_args | default('--force') }}"

  tasks:
    - name: Verify kubectl is available
      ansible.builtin.command: kubectl version --client=true
      changed_when: false

    - name: Check Minikube status
      ansible.builtin.command: minikube status
      register: minikube_status
      changed_when: false
      failed_when: false

    - name: Start Minikube when it is not running
      ansible.builtin.command: "minikube start --driver={{ minikube_driver_name }} {{ minikube_extra_args }}"
      when: minikube_status.rc != 0

    - name: Create Python virtual environment for local app dependencies
      ansible.builtin.command: "python3 -m venv {{ venv_path }}"
      args:
        creates: "{{ venv_path }}/bin/python"

    - name: Install application Python dependencies for deployment checks
      ansible.builtin.pip:
        requirements: "{{ playbook_dir }}/../app/requirements.txt"
        virtualenv: "{{ venv_path }}"

    - name: Create Kubernetes namespace
      ansible.builtin.shell: >
        kubectl create namespace {{ namespace_name }}
        --dry-run=client -o yaml | kubectl apply -f -
      register: namespace_apply
      changed_when: "'created' in namespace_apply.stdout or 'configured' in namespace_apply.stdout"

    - name: Apply Kubernetes deployment manifest
      ansible.builtin.command: "kubectl apply -f {{ k8s_dir }}/deployment.yaml -n {{ namespace_name }}"
      register: deployment_apply
      changed_when: "'configured' in deployment_apply.stdout or 'created' in deployment_apply.stdout"

    - name: Apply Kubernetes service manifest
      ansible.builtin.command: "kubectl apply -f {{ k8s_dir }}/service.yaml -n {{ namespace_name }}"
      register: service_apply
      changed_when: "'configured' in service_apply.stdout or 'created' in service_apply.stdout"

    - name: Deploy Docker image built by Jenkins
      ansible.builtin.command: >
        kubectl set image deployment/{{ deployment }}
        {{ container }}={{ image }}
        -n {{ namespace_name }}
      register: set_image
      changed_when: "'image updated' in set_image.stdout"

    - name: Scale application deployment
      ansible.builtin.command: "kubectl scale deployment/{{ deployment }} --replicas={{ replicas_count }} -n {{ namespace_name }}"
      register: scale_result
      changed_when: "'scaled' in scale_result.stdout"

    - name: Wait for deployment rollout
      ansible.builtin.command: "kubectl rollout status deployment/{{ deployment }} -n {{ namespace_name }} --timeout=180s"
      changed_when: false

    - name: Show running pods
      ansible.builtin.command: "kubectl get pods -l app={{ app_label }} -n {{ namespace_name }} -o wide"
      register: pods_status
      changed_when: false

    - name: Print pod status
      ansible.builtin.debug:
        msg: "{{ pods_status.stdout_lines }}"

    - name: Print Minikube service URL
      ansible.builtin.command: "minikube service {{ service }} -n {{ namespace_name }} --url"
      register: service_url
      changed_when: false
      failed_when: false

    - name: Show application URL
      ansible.builtin.debug:
        msg: "PM Alert is available at {{ service_url.stdout }}"
      when: service_url.rc == 0
