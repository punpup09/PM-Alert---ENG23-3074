services:
  # 1. กล่องแอปพลิเคชัน Flask ของเรา
  web:
    build: .
    container_name: safebreathe_web
    ports:
      - "5000:5000"
    environment:                     
      - DUSTBOY_API_KEY=LOPxmBuj8PcVicUOEfoZi95wTHpQHPMFiNRrEgpt
    restart: always

  # 2. กล่อง Prometheus
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      # ชี้เป้าไปที่ไฟล์ config ในโฟลเดอร์ monitoring
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    depends_on:
      - web

  # 3. กล่อง Grafana
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus

  # 4. กล่อง Jenkins CI/CD (ใช้วิธี Build จาก Dockerfile.jenkins ที่เราสร้างขึ้น)
  jenkins:
    build: 
      context: .
      dockerfile: Dockerfile.jenkins
    container_name: pm-alert-jenkins 
    privileged: true
    user: root
    ports:
      - "8081:8080"
      - "50000:50000"
    volumes:
      - ./jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    restart: always